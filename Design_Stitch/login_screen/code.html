<body class="bg-surface-container min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased font-body-md text-on-surface">
<!-- Main Container -->
<main class="w-full max-w-[420px] flex flex-col gap-12 relative z-10">
<!-- Header Section -->
<header class="flex flex-col items-center text-center gap-6">
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-secondary-container" style="font-size: 32px; font-variation-settings: 'FILL' 1;">
                    eco
                </span>
</div>
<div class="flex flex-col gap-2">
<h1 class="font-display text-display text-on-surface tracking-tight">Acesso Profissional</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Sistemas de controle e monitoramento</p>
</div>
</header>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-6" method="POST">
<!-- Email Input Group -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface pl-4" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">
                        mail
                    </span>
<input class="w-full h-14 pl-14 pr-6 rounded-full bg-surface-container-lowest border border-outline-variant focus:border-2 focus:border-tertiary-fixed focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline transition-all duration-200" id="email" name="email" placeholder="credencial@ecoinventario.com" required="" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface pl-4" for="password">Senha</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">
                        lock
                    </span>
<input class="w-full h-14 pl-14 pr-6 rounded-full bg-surface-container-lowest border border-outline-variant focus:border-2 focus:border-tertiary-fixed focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Area -->
<div class="flex flex-col gap-6 mt-4">
<button class="w-full h-16 rounded-full bg-primary text-on-primary font-label-lg text-label-lg tracking-wide hover:scale-[0.98] active:scale-95 transition-transform duration-200 flex items-center justify-center shadow-lg shadow-primary/10" type="submit">
                    Entrar
                </button>
<div class="text-center">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors underline decoration-outline-variant underline-offset-4" href="#">
                        Esqueci minha senha
                    </a>
</div>
</div>
</form>
</main>
<!-- Decorative background elements (Digital Botany Abstract) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
<div class="absolute top-[-10%] right-[-5%] w-[50vw] h-[50vw] max-w-[600px] max-h-[600px] rounded-full bg-gradient-to-br from-secondary-container/40 to-transparent blur-3xl opacity-60"></div>
<div class="absolute bottom-[-15%] left-[-10%] w-[60vw] h-[60vw] max-w-[700px] max-h-[700px] rounded-full bg-gradient-to-tr from-surface-container-high/80 to-transparent blur-3xl opacity-80"></div>
</div>
