<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Criar Manejo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-fixed-dim": "#c8c6c5",
                        "surface-tint": "#5f5e5e",
                        "on-primary-fixed": "#1c1b1b",
                        "background": "#f7faf5",
                        "on-tertiary-fixed-variant": "#304f00",
                        "inverse-on-surface": "#eff2ed",
                        "on-secondary-container": "#536a53",
                        "surface-bright": "#f7faf5",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#102000",
                        "tertiary-fixed": "#b7f569",
                        "on-secondary-fixed-variant": "#364c37",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "primary": "#000000",
                        "primary-fixed": "#e5e2e1",
                        "surface-container-high": "#e6e9e4",
                        "on-secondary-fixed": "#0a200e",
                        "on-background": "#191c1a",
                        "surface-container": "#ecefea",
                        "outline": "#747878",
                        "inverse-surface": "#2d312e",
                        "secondary": "#4d644d",
                        "secondary-container": "#cfeacc",
                        "outline-variant": "#c4c7c7",
                        "primary-container": "#1c1b1b",
                        "surface-variant": "#e0e3df",
                        "on-primary-fixed-variant": "#474746",
                        "tertiary-fixed-dim": "#9dd850",
                        "surface-container-highest": "#e0e3df",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#5d9206",
                        "secondary-fixed-dim": "#b3cdb1",
                        "on-secondary": "#ffffff",
                        "surface": "#f7faf5",
                        "on-surface-variant": "#444748",
                        "secondary-fixed": "#cfeacc",
                        "surface-container-low": "#f1f4ef",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#c8c6c5",
                        "on-error-container": "#93000a",
                        "on-surface": "#191c1a",
                        "on-tertiary-fixed": "#102000",
                        "on-primary-container": "#858383",
                        "tertiary": "#000000",
                        "surface-dim": "#d8dbd6"
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-desktop": "48px",
                        "xs": "4px",
                        "lg": "40px",
                        "xl": "64px",
                        "base": "8px",
                        "md": "24px",
                        "sm": "12px",
                        "margin-mobile": "20px",
                        "gutter": "16px"
                    },
                    fontFamily: {
                        "body-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600" }],

                        "display": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],

                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]

                }
            }
        }

<style>
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 -8px 32px 0 rgba(0, 0, 0, 0.05);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background relative min-h-screen overflow-hidden antialiased">
<!-- Background Layer (Level 0/1) - Behind Modal -->
<div class="absolute inset-0 w-full h-full bg-cover bg-center" data-alt="close up view of vibrant green monstera plant leaves overlapping with soft natural light creating shadows and depth" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDiLo33uqKbiuiyaRFgNWhFzessfcSrWP7CnHGleUNgYi25iTdSVnC-z0-ThtE2o-ok8m4Y8LMTIxLFa3FSXrvEE_hu7nOYsXj_lkmFfd7VeD3N_SDF_ydg15Rqi9mczGAuRDijBPDFZRcIy3Xpete9C25Agz-vAft185K4v-jQ1yP4rap5v9411wpP3A1g9WY-e6NVO8xDDZcqDtW1Q5MN1eSDcLDeluUHOdrd8DxakBPNcgggCqCexeUvwm8LtaWe8Z8KG5cOGWaI');"></div>
<!-- Dimming Overlay -->
<div class="absolute inset-0 bg-surface-tint/60 backdrop-blur-[2px] z-10 transition-opacity"></div>
<!-- Top App Bar (Suppressed functionality, showing context behind overlay) -->
<header class="absolute top-0 left-0 w-full flex justify-between items-center px-6 py-4 z-0 opacity-40">
<button class="text-on-error hover:opacity-70 scale-98 transition-all">
<span class="material-symbols-outlined text-2xl">menu</span>
</button>
<h1 class="font-display text-display text-xl tracking-tight text-on-error">EcoInventário</h1>
<div class="w-8 h-8 rounded-full bg-surface-container-high border-2 border-on-error/20 overflow-hidden flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-sm">person</span>
</div>
</header>
<!-- Bottom Sheet Modal (Level 2) -->
<!-- Occupying roughly 80% of the screen height (h-[707px]), with glassmorphism effects -->
<div class="fixed bottom-0 left-0 right-0 h-[751px] md:h-[707px] md:left-1/2 md:-translate-x-1/2 md:w-full md:max-w-2xl z-50 glass-panel rounded-t-[3rem] border border-white/40 flex flex-col pt-2 transition-transform duration-300 ease-out transform translate-y-0">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full mx-auto mb-2"></div>
<!-- Header -->
<div class="flex justify-between items-center px-md py-sm">
<div class="w-10"></div> <!-- Spacer for centering -->
<h2 class="font-headline-md text-headline-md text-on-surface">Criar Manejo</h2>
<button aria-label="Fechar" class="w-10 h-10 rounded-full bg-surface/50 border border-white/50 flex items-center justify-center text-on-surface-variant hover:scale-95 transition-transform">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto hide-scrollbar px-margin-mobile md:px-margin-desktop pb-[120px] flex flex-col gap-lg mt-sm">
<!-- Fotos do Manejo Section -->
<section class="flex flex-col gap-sm">
<h3 class="font-label-lg text-label-lg text-on-surface-variant ml-xs">Fotos do Manejo</h3>
<div class="grid grid-cols-2 gap-gutter">
<!-- Photo Slot: Antes -->
<button class="aspect-square rounded-[2rem] bg-white/40 border border-secondary-fixed-dim border-dashed flex flex-col items-center justify-center gap-2 hover:bg-white/60 hover:border-tertiary-fixed transition-all group">
<div class="w-12 h-12 rounded-full bg-surface-container/50 flex items-center justify-center text-secondary group-hover:text-tertiary-fixed group-hover:bg-tertiary-fixed/20 transition-colors">
<span class="material-symbols-outlined text-[28px] font-light">add_a_photo</span>
</div>
<span class="font-label-md text-label-lg text-on-surface-variant group-hover:text-on-surface">Antes</span>
</button>
<!-- Photo Slot: Depois -->
<button class="aspect-square rounded-[2rem] bg-white/40 border border-secondary-fixed-dim border-dashed flex flex-col items-center justify-center gap-2 hover:bg-white/60 hover:border-tertiary-fixed transition-all group">
<div class="w-12 h-12 rounded-full bg-surface-container/50 flex items-center justify-center text-secondary group-hover:text-tertiary-fixed group-hover:bg-tertiary-fixed/20 transition-colors">
<span class="material-symbols-outlined text-[28px] font-light">add_a_photo</span>
</div>
<span class="font-label-md text-label-lg text-on-surface-variant group-hover:text-on-surface">Depois</span>
</button>
</div>
</section>
<!-- Nível de Saúde Section -->
<section class="flex flex-col gap-sm">
<h3 class="font-label-lg text-label-lg text-on-surface-variant ml-xs">Nível de Saúde</h3>
<div class="flex flex-wrap gap-xs">
<!-- Chip: Bom (Selected) -->
<button class="px-md py-sm rounded-full bg-tertiary-fixed text-on-tertiary-fixed font-label-lg text-label-lg flex items-center gap-2 shadow-sm transition-transform hover:scale-95 border border-transparent">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">eco</span>
                        Bom
                    </button>
<!-- Chip: Regular (Unselected) -->
<button class="px-md py-sm rounded-full bg-white/50 border border-outline-variant text-on-surface font-label-lg text-label-lg flex items-center gap-2 transition-all hover:bg-white/80 hover:border-outline">
<span class="material-symbols-outlined text-[18px]">energy_savings_leaf</span>
                        Regular
                    </button>
<!-- Chip: Crítico (Unselected) -->
<button class="px-md py-sm rounded-full bg-white/50 border border-outline-variant text-on-surface font-label-lg text-label-lg flex items-center gap-2 transition-all hover:bg-white/80 hover:border-outline">
<span class="material-symbols-outlined text-[18px]">warning</span>
                        Crítico
                    </button>
</div>
</section>
<!-- Observações Section -->
<section class="flex flex-col gap-sm">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-xs" for="observacoes">Observações</label>
<div class="relative">
<textarea class="w-full bg-white/60 border border-secondary-fixed-dim rounded-[2rem] px-sm py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-tertiary-fixed focus:ring-1 focus:ring-tertiary-fixed resize-none transition-all shadow-inner" id="observacoes" placeholder="Descreva os detalhes do manejo realizado, insumos utilizados ou anomalias percebidas..." rows="4"></textarea>
<!-- Small decorative element to ground the input -->
<div class="absolute right-4 bottom-4 w-2 h-2 rounded-full bg-tertiary-fixed/30 pointer-events-none"></div>
</div>
</section>
</div>
<!-- Sticky Bottom Action Bar -->
<div class="absolute bottom-0 left-0 right-0 p-margin-mobile md:p-margin-desktop bg-gradient-to-t from-white/90 via-white/70 to-transparent pt-lg rounded-b-[3rem]">
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-label-lg text-label-lg text-center flex items-center justify-center gap-xs transition-transform hover:scale-98 duration-200 shadow-lg">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">save</span>
                Salvar Manejo
            </button>
</div>
</div>
</body></html>
